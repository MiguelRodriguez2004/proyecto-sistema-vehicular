version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sistema_vehicular_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sistema_vehicular}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: sistema_vehicular_api
    restart: always
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/sistema_vehicular?schema=public}
      PORT: ${PORT:-3000}
    depends_on:
      - db
    # Espera a que la base de datos esté lista, aplica las migraciones de Prisma y arranca el backend
    command: >
      sh -c "node scripts/wait-for-db.js && npx prisma migrate deploy && npm run dev"

volumes:
  postgres_data:
    driver: local
